<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fun Math Tables Game</title>
  <style>
    body {
      font-family: "Comic Sans MS", cursive, sans-serif;
      text-align: center;
      margin-top: 30px;
      background: linear-gradient(to bottom, #e5e5e5, #dfa2cf);
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-size: cover;
      color: #333;
    }
    h1 {
      font-size: 2.5em;
      color: #ff4081;
      text-shadow: 2px 2px #fff;
    }
    #question {
      font-size: 2.2em;
      margin: 20px;
      color: #2196f3;
    }
    #feedback {
      font-size: 2em;
      margin: 20px;
    }
    #score, #round {
      font-size: 1.5em;
      margin: 10px;
      color: #4caf50;
    }
    #playerStatus {
      font-size: 1.2em;
      margin: 10px;
      color: #1b5e20;
      font-weight: bold;
      display: none;
    }
    #timer {
      font-size: 1.3em;
      margin: 8px;
      color: #d84315;
      font-weight: bold;
      display: none;
    }
    #round,
    #score {
      display: none;
    }
    #difficultyHint {
      font-size: 0.95em;
      color: #1565c0;
      font-weight: bold;
      margin: 4px 0 0 6px;
      text-align: left;
      line-height: 1.2;
    }
    .setup-row {
      width: min(760px, 96vw);
      margin: 8px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .setup-progress {
      width: min(820px, 96vw);
      margin: 8px auto 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #1565c0;
      font-weight: bold;
    }
    .setup-progress-dots {
      display: inline-flex;
      gap: 8px;
      align-items: center;
    }
    .setup-progress-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #90caf9;
      opacity: 0.7;
      transition: transform 160ms ease, background-color 160ms ease, opacity 160ms ease;
    }
    .setup-progress-dot.active {
      background: #1565c0;
      opacity: 1;
      transform: scale(1.2);
    }
    .setup-step {
      width: min(820px, 96vw);
      margin: 10px auto;
      padding: 14px 10px 18px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.55);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      will-change: transform, opacity;
    }
    .setup-step-anim-forward {
      animation: setupStepInForward 240ms ease-out;
    }
    .setup-step-anim-back {
      animation: setupStepInBack 240ms ease-out;
    }
    @keyframes setupStepInForward {
      from {
        opacity: 0;
        transform: translateX(14px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    @keyframes setupStepInBack {
      from {
        opacity: 0;
        transform: translateX(-14px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    .setup-step-title {
      margin: 0 0 8px;
      color: #1565c0;
      font-size: 1.1em;
      font-weight: bold;
    }
    #setupActions {
      width: min(860px, 96vw);
      margin: 8px auto 10px;
    }
    #setupActions button {
      min-width: 170px;
    }
    #endRoundActions {
      display: none;
      width: min(900px, 96vw);
      margin: 8px auto 10px;
      justify-content: center;
    }
    .setup-row label {
      width: 180px;
      text-align: right;
      font-weight: bold;
      flex-shrink: 0;
    }
    .setup-control {
      width: min(520px, 90vw);
    }
    .difficulty-control {
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }
    #chooseTablesLabel {
      width: min(760px, 96vw);
      margin: 10px auto 4px;
      box-sizing: border-box;
      padding-left: 192px;
      text-align: left;
      font-weight: bold;
    }
    input[type="text"],
    input[type="number"],
    select {
      font-size: 1.5em;
      padding: 8px;
      margin: 5px;
      border: 3px solid #2196f3;
      border-radius: 10px;
      text-align: center;
    }
    #playerName,
    #difficultyLevel,
    #languageSelector {
      width: 100%;
      box-sizing: border-box;
    }
    .table-picker {
      margin: 10px auto;
      width: min(760px, 96vw);
      table-layout: fixed;
      border-collapse: collapse;
      background: #ffffff;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      overflow: hidden;
    }
    .table-picker td {
      padding: 6px 10px;
      border: 1px solid #f0f0f0;
      text-align: left;
      font-size: 1.05em;
    }
    .table-picker label {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      box-sizing: border-box;
      cursor: pointer;
    }
    .table-picker label span {
      white-space: nowrap;
      line-height: 1.2;
    }
    .table-picker input[type="checkbox"] {
      transform: scale(1.2);
      margin-right: 0;
      vertical-align: middle;
    }
    .table-picker-controls {
      text-align: center;
      background: #f7f7f7;
    }
    .table-picker-controls button {
      font-size: 0.95em;
      padding: 6px 10px;
      margin: 6px 6px;
      background-color: #2196f3;
    }
    .table-picker-controls button:hover {
      background-color: #1976d2;
    }
    #answer,
    #submitAnswer {
      display: none;
    }
    button {
      font-size: 1.2em;
      padding: 10px 20px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background-color: #ff9800;
      color: white;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover {
      transform: scale(1.1);
      background-color: #e65100;
    }
    .action-row {
      display: inline-flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    .modal {
      background: #ffffff;
      border-radius: 14px;
      padding: 18px;
      width: min(350px, 95vw);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      text-align: left;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      background: #ffffff;
      padding-bottom: 8px;
      box-shadow: 0 6px 6px -6px rgba(0, 0, 0, 0.25);
    }
    .modal-body {
      overflow: auto;
      padding-right: 4px;
    }
    .modal-actions {
      display: inline-flex;
      gap: 8px;
      align-items: center;
    }
    .modal-title {
      font-size: 1.3em;
      font-weight: bold;
      color: #2196f3;
    }
    .modal-close {
      background: #eeeeee;
      color: #333;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.95em;
    }
    .table-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 16px;
      font-size: 1.05em;
    }
    .table-grid-item {
      background: #f8f8f8;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 6px 8px;
    }
    .table-group-title {
      font-weight: bold;
      color: #ff9800;
      margin-top: 8px;
      position: sticky;
      top: 0;
      background: #ffffff;
      padding: 4px 2px;
      z-index: 1;
      box-shadow: 0 6px 6px -6px rgba(0, 0, 0, 0.25);
      grid-column: 1 / -1;
    }
    #audioPlayer {
      margin-top: 20px;
      padding: 10px;
      background: #e8f5e9;
      border-radius: 10px;
      display: inline-block;
      box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
    }
    audio {
      width: 300px;
    }
    #restart { display: none; }
    #resultsPanels {
      margin: 30px auto 0;
      width: min(1080px, 96%);
      display: none;
      align-items: flex-start;
      justify-content: center;
      gap: 24px;
    }
    #roundSummary {
      margin-top: 0;
      text-align: left;
      display: block;
      width: min(500px, 100%);
      background: #e3f2fd;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 3px 3px 10px rgba(0,0,0,0.2);
    }
    #roundSummary h2 { text-align: center; color: #2196f3; }
    #progress {
      margin-top: 0;
      text-align: left;
      display: block;
      width: min(500px, 100%);
      background: #e3f2fd;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 3px 3px 10px rgba(0,0,0,0.2);
    }
    .round-item {
      background: white;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border-left: 5px solid #4caf50;
    }
    #sessionSummary {
      margin-top: 0;
      text-align: left;
      display: block;
      width: min(500px, 100%);
      background: #fff3e0;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 3px 3px 10px rgba(0,0,0,0.2);
    }
    #sessionSummary h2 { text-align: center; color: #e65100; }
    .session-player-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 0.95em;
    }
    .session-player-table th,
    .session-player-table td {
      border: 1px solid #ffe0b2;
      padding: 6px 8px;
      text-align: left;
    }
    .session-player-table th { background: #fff8e1; }
    #highScores {
      margin-top: 0;
      text-align: left;
      display: block;
      width: min(500px, 100%);
      background: #e8f5e9;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 3px 3px 10px rgba(0,0,0,0.2);
    }
    #highScores h2 { text-align: center; color: #1b5e20; }
    .highscore-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .highscore-filter {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      font-size: 0.95em;
    }
    .highscore-filter label {
      font-weight: bold;
      color: #1b5e20;
    }
    .highscore-filter select {
      font-size: 0.95em;
      padding: 6px 8px;
      border-width: 2px;
      border-color: #66bb6a;
      border-radius: 8px;
    }
    .highscore-clear {
      font-size: 0.9em;
      padding: 6px 10px;
      margin-top: 0;
      background: #2e7d32;
    }
    .highscore-clear:hover {
      background: #1b5e20;
      transform: scale(1.05);
    }
    .highscore-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 0.95em;
    }
    .highscore-table th,
    .highscore-table td {
      border: 1px solid #c8e6c9;
      padding: 6px 8px;
      text-align: left;
    }
    .highscore-table th { background: #f1f8e9; }
    .round-item h3 { margin: 5px 0; color: #ff9800; }
    .round-item p { margin: 5px 0; }
    #progress h2 { text-align: center; color: #ff4081; }
    .progress-container { 
      margin: 0 auto;
      width: 400px;
    }
    .progress-label { margin-bottom: 3px; font-weight: bold; }
    .progress-bar {
      width: 100%;
      background-color: #ddd;
      border-radius: 10px;
      overflow: hidden;
    }
    .progress-fill {
      height: 25px;
      background-color: #4caf50;
      text-align: center;
      color: white;
      line-height: 25px;
      font-size: 1em;
      transition: width 0.5s ease;
    }
    .qa-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 0.95em;
    }
    .qa-table th,
    .qa-table td {
      border: 1px solid #ddd;
      padding: 6px 8px;
      text-align: left;
    }
    .qa-table th {
      background: #f5f5f5;
    }
    .qa-result-correct {
      color: #2e7d32;
      font-weight: bold;
    }
    .qa-result-wrong {
      color: #c62828;
      font-weight: bold;
    }
    .qa-row-multiple-attempts {
      background: #fff8e1;
    }
    @media (min-width: 769px) and (max-width: 1366px) {
      body {
        margin-top: 22px;
      }
      .setup-progress {
        width: min(900px, 94vw);
        font-size: 1.05em;
      }
      h1 {
        font-size: 2.35em;
      }
      #resultsPanels {
        flex-direction: column;
        align-items: center;
        width: min(980px, 94vw);
      }
      #roundSummary,
      #progress,
      #highScores,
      #sessionSummary {
        width: min(940px, 94vw);
      }
      .setup-step {
        width: min(980px, 94vw);
        padding: 20px 18px 22px;
      }
      .setup-step-title {
        font-size: 1.28em;
        margin-bottom: 12px;
      }
      .setup-row {
        width: min(900px, 92vw);
        gap: 16px;
        margin: 12px auto;
      }
      .setup-row label {
        width: 210px;
        font-size: 1.05em;
      }
      .setup-control {
        width: min(640px, 74vw);
      }
      #chooseTablesLabel {
        width: min(900px, 92vw);
        padding-left: 226px;
        margin-top: 12px;
        font-size: 1.06em;
      }
      .table-picker {
        width: min(900px, 92vw);
      }
      .table-picker td {
        padding: 10px 12px;
        font-size: 1.1em;
      }
      .table-picker input[type="checkbox"] {
        transform: scale(1.35);
      }
      #setupActions {
        width: min(900px, 94vw);
        gap: 12px;
      }
      #setupActions button {
        font-size: 1.15em;
        padding: 13px 24px;
        min-height: 50px;
      }
      #gameControlActions button {
        min-height: 46px;
      }
      input[type="text"],
      input[type="number"],
      select {
        min-height: 50px;
      }
    }
    @media (max-width: 1024px) {
      .modal-backdrop {
        align-items: flex-start;
      }
      .modal {
        margin-top: 70px;
      }
      h1 {
        font-size: 2.2em;
      }
      button {
        font-size: 1.15em;
        padding: 12px 20px;
      }
      input {
        font-size: 1.3em;
        padding: 10px;
      }
      .table-grid {
        font-size: 1em;
      }
      .table-grid-item {
        padding: 6px 6px;
      }
      #question,
      #feedback,
      #score,
      #round {
        margin: 16px 0;
      }
      .round-item {
        margin: 14px 0;
      }
      #resultsPanels {
        flex-direction: column;
        align-items: center;
      }
      #roundSummary,
      #progress,
      #highScores,
      #sessionSummary {
        width: 90%;
      }
      .table-picker {
        width: 90%;
      }
      .modal {
        width: min(420px, 92vw);
      }
    }
    @media (max-width: 768px) {
      .modal-backdrop {
        align-items: flex-start;
      }
      .modal {
        margin-top: 60px;
      }
      body {
        margin-top: 20px;
      }
      h1 {
        font-size: 2em;
      }
      button {
        font-size: 1.1em;
        padding: 12px 18px;
      }
      input {
        font-size: 1.2em;
        width: 90%;
        padding: 10px;
      }
      .action-row {
        flex-direction: column;
        width: 100%;
      }
      .action-row button {
        width: 90%;
      }
      .table-picker {
        width: 95%;
      }
      .table-picker td {
        font-size: 1em;
      }
      .table-grid {
        font-size: 0.95em;
      }
      .table-grid-item {
        padding: 6px 6px;
      }
      #question,
      #feedback,
      #score,
      #round {
        margin: 14px 0;
      }
      .round-item {
        margin: 12px 0;
      }
      #resultsPanels {
        width: 100%;
      }
      #roundSummary,
      #progress,
      #highScores,
      #sessionSummary {
        width: 95%;
      }
      .modal {
        width: min(320px, 92vw);
      }
      .table-grid {
        grid-template-columns: 1fr;
      }
      .qa-table {
        font-size: 0.9em;
      }
      .setup-row {
        width: 95%;
        flex-direction: column;
        align-items: stretch;
        gap: 6px;
      }
      .setup-step {
        width: 95%;
        padding: 12px 6px 14px;
      }
      .setup-progress {
        width: 95%;
        font-size: 0.95em;
        gap: 10px;
      }
      .setup-row label {
        width: auto;
        text-align: left;
      }
      .setup-control {
        width: 100%;
      }
      #difficultyHint {
        margin-left: 0;
      }
      #chooseTablesLabel {
        width: 95%;
        padding-left: 0;
      }
    }
  </style>
</head>
<body>
  <h1 id="appTitle">🎉 Fun Math Tables Game 🎉</h1>

  <!-- Difficulty Selector -->
  <div id="tableSelector">
    <div id="setupProgress" class="setup-progress">
      <span id="setupProgressText">Step 1 of 2</span>
      <div class="setup-progress-dots" aria-hidden="true">
        <span id="setupProgressDot1" class="setup-progress-dot active"></span>
        <span id="setupProgressDot2" class="setup-progress-dot"></span>
      </div>
    </div>
    <div id="setupStepOne" class="setup-step">
      <div id="setupStepOneTitle" class="setup-step-title">Step 1: Player Details</div>
      <div class="setup-row">
        <label for="languageSelector" id="languageLabel">Language:</label>
        <select id="languageSelector" class="setup-control">
          <option value="en">English</option>
          <option value="es">Espa&ntilde;ol</option>
        </select>
      </div>
      <div class="setup-row">
        <label for="playerName" id="playerNameLabel">Player name:</label>
        <input type="text" id="playerName" class="setup-control" placeholder="Enter player name" maxlength="30" autocomplete="name">
      </div>
    </div>
    <div id="setupStepTwo" class="setup-step" style="display: none;">
      <div id="setupStepTwoTitle" class="setup-step-title">Step 2: Choose Tables</div>
      <div class="setup-row">
        <label for="difficultyLevel" id="difficultyLabel">Difficulty:</label>
        <div class="setup-control difficulty-control">
          <select id="difficultyLevel">
            <option value="1" id="difficultyOption1">Easy</option>
            <option value="2" id="difficultyOption2">Medium</option>
            <option value="3" id="difficultyOption3">Hard</option>
            <option value="4" id="difficultyOption4">Hardest</option>
            <option value="5" id="difficultyOption5">Ultimate</option>
          </select>
          <div id="difficultyHint"></div>
        </div>
      </div>
      <div id="chooseTablesLabel">Choose table(s):</div>
      <table class="table-picker" aria-label="Table selection">
        <tbody>
          <tr>
            <td class="table-picker-controls" colspan="2">
              <button type="button" id="selectAllTablesBtn" onclick="selectAllTables()">Select All</button>
              <button type="button" id="clearAllTablesBtn" onclick="clearAllTables()">Clear All</button>
            </td>
          </tr>
          <tr>
            <td><label><input type="checkbox" class="table-option" value="1"><span id="tableOptionLabel1">Table of 1</span></label></td>
            <td><label><input type="checkbox" class="table-option" value="2"><span id="tableOptionLabel2">Table of 2</span></label></td>
          </tr>
          <tr>
            <td><label><input type="checkbox" class="table-option" value="3"><span id="tableOptionLabel3">Table of 3</span></label></td>
            <td><label><input type="checkbox" class="table-option" value="4"><span id="tableOptionLabel4">Table of 4</span></label></td>
          </tr>
          <tr>
            <td><label><input type="checkbox" class="table-option" value="5"><span id="tableOptionLabel5">Table of 5</span></label></td>
            <td><label><input type="checkbox" class="table-option" value="6"><span id="tableOptionLabel6">Table of 6</span></label></td>
          </tr>
          <tr>
            <td><label><input type="checkbox" class="table-option" value="7"><span id="tableOptionLabel7">Table of 7</span></label></td>
            <td><label><input type="checkbox" class="table-option" value="8"><span id="tableOptionLabel8">Table of 8</span></label></td>
          </tr>
          <tr>
            <td><label><input type="checkbox" class="table-option" value="9"><span id="tableOptionLabel9">Table of 9</span></label></td>
            <td><label><input type="checkbox" class="table-option" value="10"><span id="tableOptionLabel10">Table of 10</span></label></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
  <div class="action-row" id="setupActions">
    <button id="nextSetupBtn" onclick="goToTableStep()">➡️ Next</button>
    <button id="backSetupBtn" onclick="goToPlayerStep()" style="display: none;">⬅️ Back</button>
    <button id="startGameBtn" onclick="startGame()">🚀 Start Game</button>
    <button id="viewTable" onclick="openTableModal()">📘 View Tables</button>
  </div>
  <div class="action-row" id="gameControlActions" style="display: none;">
    <button id="clearSetupBtn" onclick="clearSetup()">🧹 Clear Setup</button>
    <button id="resetGameBtn" onclick="resetGame()" style="display: none;">🔁 Reset Game</button>
    <button id="endSessionBtn" onclick="endSession()" style="display: none;">🛑 End Session</button>
  </div>
  <div class="action-row" id="endRoundActions">
    <button id="newGameFromSummaryBtn" onclick="startNewGameFromResults()">🚀 New Game</button>
    <button id="resetToStep1Btn" onclick="resetToStepOne()">🔁 Reset Game</button>
  </div>

  <div id="playerStatus">Player: Not set</div>
  <div id="round"></div>
  <div id="score"></div>
  <div id="timer">⏱️ Time: --</div>
  <div id="question"></div>
  <input type="number" id="answer" placeholder="Type answer here">

    function tr(key, vars = {}) {
      const langPack = i18n[currentLanguage] || i18n.en;
      const fallback = i18n.en[key];
      const value = langPack[key] ?? fallback ?? key;
      if (typeof value !== "string") {
        return value;
      }
      return value.replace(/\{(\w+)\}/g, (_, token) => {
        return Object.prototype.hasOwnProperty.call(vars, token) ? vars[token] : `{${token}}`;
      });
    }

      currentLanguage = languageCode === "es" ? "es" : "en";
      document.documentElement.lang = currentLanguage;
      applyStaticTranslations();
      updateDifficultyHint();
      updateStatus();
      updateRoundSummary();
      updateProgress();
      renderSessionSummary();
      renderHighScores();

    function createEmptyTableStats() {
      const stats = {};
      for (let i = 1; i <= 10; i++) {
        stats[i] = { correct: 0, total: 0 };
      }
      return stats;
    }

    function ensurePlayerData(playerName) {
      if (!playerRoundHistory[playerName]) {
        playerRoundHistory[playerName] = [];
      }
      if (!playerTableStats[playerName]) {
        playerTableStats[playerName] = createEmptyTableStats();
      }
      if (typeof playerCumulativePoints[playerName] !== "number") {
        playerCumulativePoints[playerName] = 0;
      }
    }

    function setActivePlayer(playerName) {
      if (!playerName) {
        return;
      }
      ensurePlayerData(playerName);
      currentPlayer = playerName;
      roundHistory = playerRoundHistory[playerName];
      tableStats = playerTableStats[playerName];
      cumulativePoints = playerCumulativePoints[playerName];
      updatePlayerStatus();
    }

    function toggleResultsPanels(show) {
      document.getElementById("resultsPanels").style.display = show ? "flex" : "none";
    }

    function updateViewTableVisibility() {
      const level = getActiveDifficultyLevel();
      const hideViewTable = level === 3 || level === 5;
      const shouldShow = !gameInProgress && setupStep === 2 && !hideViewTable;
      document.getElementById("viewTable").style.display = shouldShow ? "inline-block" : "none";
    }

    function updateSetupStepUI() {
      const showSetup = !gameInProgress;
      const stepOne = document.getElementById("setupStepOne");
      const stepTwo = document.getElementById("setupStepTwo");
      const setupActions = document.getElementById("setupActions");
      const showSetupPanels = showSetup && !postRoundMode;

      document.getElementById("tableSelector").style.display = showSetupPanels ? "block" : "none";
      setupActions.style.display = showSetupPanels ? "inline-flex" : "none";

      if (!showSetupPanels) {
        return;
      }

      stepOne.style.display = setupStep === 1 ? "block" : "none";
      stepTwo.style.display = setupStep === 2 ? "block" : "none";

      if (setupStep !== previousSetupStep) {
        animateSetupStep(setupStep === 1 ? stepOne : stepTwo, setupStep > previousSetupStep ? "forward" : "back");
      }

      document.getElementById("nextSetupBtn").style.display = setupStep === 1 ? "inline-block" : "none";
      document.getElementById("backSetupBtn").style.display = setupStep === 2 ? "inline-block" : "none";
      document.getElementById("startGameBtn").style.display = setupStep === 2 ? "inline-block" : "none";
      updateSetupProgress();
      updateViewTableVisibility();
      previousSetupStep = setupStep;
    }

    function updateSetupProgress() {
      const progressText = document.getElementById("setupProgressText");
      const dot1 = document.getElementById("setupProgressDot1");
      const dot2 = document.getElementById("setupProgressDot2");
      const progressWrap = document.getElementById("setupProgress");
      const showSetup = !gameInProgress && !postRoundMode;

      if (progressWrap) {
        progressWrap.style.display = showSetup ? "flex" : "none";
      }
      if (!progressText || !dot1 || !dot2) {
        return;
      }

      progressText.textContent = tr("setupProgressText", { current: setupStep, total: 2 });
      dot1.classList.toggle("active", setupStep === 1);
      dot2.classList.toggle("active", setupStep === 2);
    }

    function animateSetupStep(stepElement, direction) {
      if (!stepElement) {
        return;
      }
      stepElement.classList.remove("setup-step-anim-forward", "setup-step-anim-back");
      void stepElement.offsetWidth;
      stepElement.classList.add(direction === "back" ? "setup-step-anim-back" : "setup-step-anim-forward");
    }

    function goToTableStep() {
      setupStep = 2;
      updateSetupStepUI();
    }

    function goToPlayerStep() {
      setupStep = 1;
      updateSetupStepUI();
    }

    function updateActionButtons() {
      const hasCompletedRounds = Array.isArray(roundHistory) && roundHistory.length > 0;
      const showPostRoundActions = !gameInProgress && hasCompletedRounds;
      document.getElementById("clearSetupBtn").style.display = showPostRoundActions ? "inline-block" : "none";
      document.getElementById("resetGameBtn").style.display = showPostRoundActions ? "inline-block" : "none";
      document.getElementById("gameControlActions").style.display = postRoundMode ? "none" : (showPostRoundActions || gameInProgress ? "inline-flex" : "none");
      document.getElementById("endRoundActions").style.display = postRoundMode ? "inline-flex" : "none";
      updateSetupStepUI();
      updateViewTableVisibility();
    }

    function resetToStepOne() {
      postRoundMode = false;
      resetGame();
      const playerNameInput = document.getElementById("playerName");
      if (playerNameInput) {
        playerNameInput.focus();
      }
    }

    function startNewGameFromResults() {
      postRoundMode = false;
      gameInProgress = false;
      questionActive = false;
      clearQuestionTimer();
      setupStep = 2;
      updateSetupStepUI();
      updateActionButtons();
      updateGameInfoVisibility();
      updateTimerDisplay();
      toggleResultsPanels(false);
      document.getElementById("question").textContent = "";
      document.getElementById("answer").style.display = "none";
      document.getElementById("submitAnswer").style.display = "none";
      document.getElementById("restart").style.display = "none";
      const difficultySelect = document.getElementById("difficultyLevel");
      if (difficultySelect) {
        difficultySelect.focus();
      }
    }

    function updateGameInfoVisibility() {
      const showGameInfo = gameInProgress;
      document.getElementById("playerStatus").style.display = showGameInfo ? "block" : "none";
      document.getElementById("round").style.display = showGameInfo ? "block" : "none";
      document.getElementById("score").style.display = showGameInfo ? "block" : "none";
      document.getElementById("timer").style.display = showGameInfo ? "block" : "none";
    }

    function getDifficultySeconds(level) {
      if (level === 2) {
        return 20;
      }
      if (level === 3) {
        return 10;
      }
      if (level === 4) {
        return 5;
      }
      if (level === 5) {
        return 5;
      }
      return 30;
    }

    function getTableSelectionLimit(level) {
      if (level === 1) {
        return 1;
      }
      if (level === 2) {
        return 3;
      }
      if (level === 3) {
        return 5;
      }
      if (level === 4) {
        return 7;
      }
      if (level === 5) {
        return 10;
      }
      return 10;
    }

    function getMinimumTableSelection(level) {
      if (level === 1) {
        return 1;
      }
      if (level === 2) {
        return 1;
      }
      if (level === 3) {
        return 3;
      }
      if (level === 4) {
        return 5;
      }
      if (level === 5) {
        return 10;
      }
      return 10;
    }

    function updateDifficultyHint() {
      const level = getActiveDifficultyLevel();
      const minTables = getMinimumTableSelection(level);
      const maxTables = getTableSelectionLimit(level);
      const extra = minTables !== maxTables ? `-${maxTables}` : "";
      document.getElementById("difficultyHint").textContent = tr("requiredTables", { min: minTables, extra: extra });
    }

    function getActiveDifficultyLevel() {
      return parseInt(document.getElementById("difficultyLevel").value, 10) || 1;
    }

    function getDifficultyLabel(level) {
      const normalizedLevel = Number(level);
      if (normalizedLevel >= 1 && normalizedLevel <= 5) {
        return tr(`difficulty${normalizedLevel}`);
      }
      return tr("unknownDifficulty");
    }

    function generateFriendlyPlayerName() {
      const prefixes = [
        "Happy", "Bright", "Super", "Clever", "Brave", "Sunny", "Rapid", "Kind", "Lucky", "Mighty"
      ];
      const suffixes = [
        "Panda", "Tiger", "Dolphin", "Falcon", "Koala", "Lion", "Otter", "Fox", "Eagle", "Bear"
      ];
      const randomPrefix = prefixes[Math.floor(Math.random() * prefixes.length)];
      const randomSuffix = suffixes[Math.floor(Math.random() * suffixes.length)];
      const randomNumber = Math.floor(Math.random() * 90) + 10;
      return `${randomPrefix} ${randomSuffix} ${randomNumber}`;
    }

    function enforceTableSelectionLimit(changedOption = null) {
      const currentLevel = getActiveDifficultyLevel();
      const maxTables = getTableSelectionLimit(currentLevel);
      const selectedOptions = Array.from(document.querySelectorAll(".table-option:checked"));

      if (selectedOptions.length <= maxTables) {
        return true;
      }

      if (changedOption && changedOption.checked) {
        changedOption.checked = false;
      } else {
        while (selectedOptions.length > maxTables) {
          const removed = selectedOptions.pop();
          removed.checked = false;
        }
      }

      document.getElementById("feedback").textContent =
        currentLevel === 1 ? tr("warningOnlyEasyTable") : tr("warningDifficultyMax", { max: maxTables });
      return false;
    }

    function updateTimerDisplay() {
      if (!questionActive) {
        document.getElementById("timer").textContent = tr("timerIdle");
        return;
      }
      document.getElementById("timer").textContent = tr("timerActive", { seconds: timeRemaining });
    }

    function getAudioContext() {
      if (!audioCtx) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) {
          return null;
        }
        audioCtx = new AudioContextClass();
      }
      return audioCtx;
    }

    function playTone(ctx, frequency, startOffset, duration, type, gainValue) {
      const oscillator = ctx.createOscillator();
      const gainNode = ctx.createGain();
      const startTime = ctx.currentTime + startOffset;
      const endTime = startTime + duration;

      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, startTime);

      gainNode.gain.setValueAtTime(0.0001, startTime);
      gainNode.gain.exponentialRampToValueAtTime(gainValue, startTime + 0.02);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, endTime);

      oscillator.connect(gainNode);
      gainNode.connect(ctx.destination);
      oscillator.start(startTime);
      oscillator.stop(endTime + 0.02);
    }

    function playSound(kind) {
      const ctx = getAudioContext();
      if (!ctx) {
        return;
      }
      if (ctx.state === "suspended") {
        ctx.resume();
      }

      if (kind === "success") {
        playTone(ctx, 660, 0, 0.12, "sine", 0.09);
        playTone(ctx, 880, 0.13, 0.14, "sine", 0.1);
        return;
      }

      if (kind === "wrong") {
        playTone(ctx, 240, 0, 0.2, "triangle", 0.08);
        return;
      }

      if (kind === "failed") {
        playTone(ctx, 320, 0, 0.12, "sawtooth", 0.09);
        playTone(ctx, 250, 0.12, 0.12, "sawtooth", 0.085);
        playTone(ctx, 180, 0.24, 0.16, "sawtooth", 0.08);
        return;
      }

      if (kind === "roundComplete") {
        playTone(ctx, 523, 0, 0.12, "sine", 0.1);
        playTone(ctx, 659, 0.12, 0.12, "sine", 0.1);
        playTone(ctx, 784, 0.24, 0.16, "sine", 0.11);
        return;
      }

      if (kind === "tick") {
        playTone(ctx, 980, 0, 0.035, "square", 0.04);
      }
    }

    function clearQuestionTimer() {
      if (questionTimerId) {
        clearInterval(questionTimerId);
        questionTimerId = null;
      }
    }

    function startQuestionTimer() {
      clearQuestionTimer();
      timeRemaining = questionTimeLimit;
      updateTimerDisplay();

      questionTimerId = setInterval(() => {
        if (!questionActive) {
          clearQuestionTimer();
          return;
        }
        timeRemaining--;
        updateTimerDisplay();
        if (timeRemaining > 0) {
          playSound("tick");
        }
        if (timeRemaining <= 0) {
          handleTimeUp();
        }
      }, 1000);
    }

    function handleTimeUp() {
      if (!questionActive) {
        return;
      }
      questionActive = false;
      clearQuestionTimer();
      playSound("failed");
      document.getElementById("feedback").textContent = tr("timeUp", { answer: correctAnswer });

      tableStats[num1].total++;
      questionLog.push({
        prompt: `${num1} × ${num2}`,
        userAnswer: tr("noAnswer"),
        correctAnswer: correctAnswer,
        isCorrect: false,
        attempts: attempts,
        earnedPoints: 0
      });

      updateStatus();
      updateProgress();
      setTimeout(newQuestion, 1200);
    }

    function startGame() {
      postRoundMode = false;
      const playerInput = document.getElementById("playerName");
      let playerName = playerInput.value.trim();
      if (!playerName) {
        playerName = generateFriendlyPlayerName();
        playerInput.value = playerName;
        document.getElementById("feedback").textContent = tr("autoAssignedPlayerName", { name: playerName });
      }

      setActivePlayer(playerName);
      const ctx = getAudioContext();
      if (ctx && ctx.state === "suspended") {
        ctx.resume();
      }
      difficultyLevel = parseInt(document.getElementById("difficultyLevel").value, 10) || 1;
      questionTimeLimit = getDifficultySeconds(difficultyLevel);
      selectedTables = getSelectedTables();
      const maxTables = getTableSelectionLimit(difficultyLevel);
      const minTables = getMinimumTableSelection(difficultyLevel);
      if (selectedTables.length === 0) {
        document.getElementById("feedback").textContent = tr("warningSelectTable");
        return;
      }
      if (selectedTables.length < minTables) {
        document.getElementById("feedback").textContent = tr("warningMinTables", { min: minTables });
        return;
      }
      if (selectedTables.length > maxTables) {
        document.getElementById("feedback").textContent = tr("warningMaxTables", { max: maxTables });
        return;
      }
      totalQuestions = selectedTables.length * 10;
      gameInProgress = true;
      points = 0;
      correctAnswers = 0;
      currentQuestion = 0;
      askedQuestions.clear();
      questionLog = [];
      updateSetupStepUI();
      document.getElementById("endSessionBtn").style.display = "inline-block";
      document.getElementById("restart").style.display = "none";
      updateActionButtons();
      updateGameInfoVisibility();
      toggleResultsPanels(false);
      document.getElementById("answer").style.display = "inline-block";
      document.getElementById("submitAnswer").style.display = "inline-block";
      newQuestion();
    }

    function newQuestion() {
      if (currentQuestion >= totalQuestions) {
        endRound();
        return;
      }
      
      // Generate unique question not asked in this round
      let questionKey;
      let maxAttempts = 100;
      let attemptCount = 0;
      
      do {
        num1 = selectedTables[Math.floor(Math.random() * selectedTables.length)];
        num2 = Math.floor(Math.random() * 10) + 1;
        questionKey = `${num1}x${num2}`;
        attemptCount++;
      } while (askedQuestions.has(questionKey) && attemptCount < maxAttempts);
      
      askedQuestions.add(questionKey);
      correctAnswer = num1 * num2;
      attempts = 0;
      questionActive = true;
      currentQuestion++;
      document.getElementById("question").textContent = `${num1} × ${num2} = ?`;
      document.getElementById("feedback").textContent = "";
      document.getElementById("answer").value = "";
      document.getElementById("answer").focus();
      startQuestionTimer();
      updateStatus();
    }

    function checkAnswer() {
      if (!questionActive) {
        return;
      }
      const userAnswer = parseInt(document.getElementById("answer").value);
      if (Number.isNaN(userAnswer)) {
        document.getElementById("feedback").textContent = tr("warningEnterNumber");
        return;
      }
      tableStats[num1].total++;

      if (userAnswer === correctAnswer) {
        questionActive = false;
        clearQuestionTimer();
        playSound("success");
        const earnedPoints = 3 - attempts;
        document.getElementById("feedback").textContent = tr("feedbackCorrect");
        questionLog.push({
          prompt: `${num1} × ${num2}`,
          userAnswer: userAnswer,
          correctAnswer: correctAnswer,
          isCorrect: true,
          attempts: attempts + 1,
          earnedPoints: earnedPoints
        });
        correctAnswers++;
        points += earnedPoints;
        tableStats[num1].correct++;
        setTimeout(newQuestion, 1000);
      } else {
        attempts++;
        if (attempts < 3) {
          playSound("wrong");
          document.getElementById("feedback").textContent = tr("feedbackTryAgain", { left: 3 - attempts });
          document.getElementById("answer").value = "";
          document.getElementById("answer").focus();
        } else {
          questionActive = false;
          clearQuestionTimer();
          playSound("failed");
          document.getElementById("feedback").textContent = tr("feedbackWrongAnswer", { answer: correctAnswer });
          questionLog.push({
            prompt: `${num1} × ${num2}`,
            userAnswer: userAnswer,
            correctAnswer: correctAnswer,
            isCorrect: false,
            attempts: attempts,
            earnedPoints: 0
          });
          setTimeout(newQuestion, 1500);
        }
      }
      updateStatus();
      updateProgress();
    }

    function updateStatus() {
      const pointsAvailable = currentQuestion * 3;
      document.getElementById("score").textContent = tr("scoreStatus", { points: points, available: pointsAvailable });
      document.getElementById("round").textContent = tr("questionStatus", { current: currentQuestion, total: totalQuestions });
    }

    function endRound() {
      totalRounds++;
      gameInProgress = false;
      questionActive = false;
      clearQuestionTimer();
      cumulativePoints += points;
      playerCumulativePoints[currentPlayer] = cumulativePoints;
      
      // Save round summary
      const roundData = {
        roundNumber: roundHistory.length + 1,
        player: currentPlayer,
        difficultyLevel: difficultyLevel,
        table: describeSelectedTables(selectedTables),
        points: points,
        pointsAvailable: totalQuestions * 3,
        correctAnswers: correctAnswers,
        totalQuestions: totalQuestions,
        percentage: Math.round((correctAnswers / totalQuestions) * 100),
        questionsAsked: Array.from(askedQuestions),
        questions: questionLog.slice()
      };
      roundHistory.push(roundData);
      updateHighScores(roundData);
      updateRoundSummary();
      renderSessionSummary();
      playSound("roundComplete");
      
      document.getElementById("question").textContent = "";
      document.getElementById("feedback").innerHTML = tr("roundCompleteMessage", {
        player: currentPlayer,
        points: points,
        pointsAvailable: roundData.pointsAvailable,
        correct: correctAnswers,
        total: totalQuestions,
        percentage: roundData.percentage,
        rounds: roundHistory.length,
        cumulative: cumulativePoints
      });
      document.getElementById("score").textContent = "";
      document.getElementById("round").textContent = "";
      postRoundMode = true;
      setupStep = 2;
      updateSetupStepUI();
      document.getElementById("resetGameBtn").style.display = "inline-block";
      document.getElementById("endSessionBtn").style.display = "none";
      document.getElementById("restart").style.display = "inline-block";
      updateActionButtons();
      updateGameInfoVisibility();
      toggleResultsPanels(true);
      document.getElementById("answer").style.display = "none";
      document.getElementById("submitAnswer").style.display = "none";
      updateTimerDisplay();

      const resultsSection = document.getElementById("resultsPanels");
      if (resultsSection) {
        resultsSection.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    function endSession() {
      if (questionActive) {
        const confirmEnd = window.confirm(tr("endSessionConfirm"));
        if (!confirmEnd) {
          return;
        }
      }

      gameInProgress = false;
      questionActive = false;
      clearQuestionTimer();
      document.getElementById("question").textContent = "";
      document.getElementById("answer").style.display = "none";
      document.getElementById("submitAnswer").style.display = "none";
      document.getElementById("restart").style.display = "none";
      postRoundMode = true;
      setupStep = 2;
      updateSetupStepUI();
      document.getElementById("resetGameBtn").style.display = "none";
      document.getElementById("endSessionBtn").style.display = "none";
      document.getElementById("score").textContent = "";
      document.getElementById("round").textContent = "";
      updateActionButtons();
      updateGameInfoVisibility();
      updateTimerDisplay();

      renderSessionSummary();
      toggleResultsPanels(true);
      document.getElementById("feedback").textContent = tr("endSessionMessage");

      const resultsSection = document.getElementById("resultsPanels");
      if (resultsSection) {
        resultsSection.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    function restartGame() {
      gameInProgress = true;
      postRoundMode = false;
      questionActive = false;
      clearQuestionTimer();
      points = 0;
      correctAnswers = 0;
      currentQuestion = 0;
      askedQuestions.clear();
      questionLog = [];
      updateSetupStepUI();
      document.getElementById("restart").style.display = "none";
      document.getElementById("endSessionBtn").style.display = "inline-block";
      updateActionButtons();
      updateGameInfoVisibility();
      toggleResultsPanels(false);
      document.getElementById("answer").style.display = "inline-block";
      document.getElementById("submitAnswer").style.display = "inline-block";
      newQuestion();
    }

    function resetGame() {
      gameInProgress = false;
      postRoundMode = false;
      questionActive = false;
      clearQuestionTimer();
      points = 0;
      correctAnswers = 0;
      currentQuestion = 0;
      totalQuestions = 10;
      totalRounds = 0;
      cumulativePoints = 0;
      selectedTables = [];
      askedQuestions.clear();
      questionLog = [];
      roundHistory = [];
      if (currentPlayer) {
        playerRoundHistory[currentPlayer] = [];
        playerTableStats[currentPlayer] = createEmptyTableStats();
        playerCumulativePoints[currentPlayer] = 0;
        roundHistory = playerRoundHistory[currentPlayer];
        tableStats = playerTableStats[currentPlayer];
      } else {
        tableStats = createEmptyTableStats();
      }

      setupStep = 1;
      updateSetupStepUI();
      document.getElementById("resetGameBtn").style.display = "none";
      document.getElementById("endSessionBtn").style.display = "none";
      document.getElementById("restart").style.display = "none";
      updateActionButtons();
      updateGameInfoVisibility();
      toggleResultsPanels(false);
      document.getElementById("answer").style.display = "none";
      document.getElementById("submitAnswer").style.display = "none";
      document.getElementById("question").textContent = "";
      document.getElementById("feedback").textContent = "";
      document.getElementById("score").textContent = "";
      document.getElementById("round").textContent = "";
      updateTimerDisplay();
      updatePlayerStatus(true);

      document.querySelectorAll(".table-option").forEach((opt) => {
        opt.checked = false;
      });

      updateProgress();
      updateRoundSummary();
      renderSessionSummary();
      renderHighScores();
    }

    function clearSetup() {
      if (questionActive) {
        const confirmClear = window.confirm(tr("clearSetupConfirm"));
        if (!confirmClear) {
          return;
        }
      }

      resetGame();

      document.getElementById("playerName").value = "";
      document.getElementById("difficultyLevel").value = "1";
      document.querySelectorAll(".table-option").forEach((opt) => {
        opt.checked = false;
      });

      currentPlayer = "";
      roundHistory = [];
      tableStats = createEmptyTableStats();
      cumulativePoints = 0;

      const highScoreFilter = document.getElementById("highScoreFilter");
      if (highScoreFilter) {
        highScoreFilter.value = "all";
      }

      setupStep = 1;
      updateDifficultyHint();
      updateActionButtons();
      updateGameInfoVisibility();
      updatePlayerStatus(true);
      updateRoundSummary();
      updateProgress();
      renderHighScores();
      document.getElementById("feedback").textContent = tr("setupCleared");
      setTimeout(() => {
        document.getElementById("feedback").textContent = "";
      }, 2000);
    }

    function updateRoundSummary() {
      const summaryList = document.getElementById("summaryList");
      summaryList.innerHTML = "";
      
      // Display rounds in reverse order (newest first)
      for (let i = roundHistory.length - 1; i >= 0; i--) {
        const round = roundHistory[i];
        const roundDiv = document.createElement("div");
        roundDiv.className = "round-item";

        const tableRows = round.questions.map((item) => {
          const resultClass = item.isCorrect ? "qa-result-correct" : "qa-result-wrong";
          const resultText = item.isCorrect ? tr("resultCorrect") : tr("resultWrong");
          const rowClass = item.attempts >= 2 ? "qa-row-multiple-attempts" : "";
          return `
            <tr class="${rowClass}">
              <td>${item.prompt}</td>
              <td>${item.userAnswer}</td>
              <td>${item.correctAnswer}</td>
              <td>${item.attempts}</td>
              <td>${item.earnedPoints}</td>
              <td class="${resultClass}">${resultText}</td>
            </tr>
          `;
        }).join("");
        
        roundDiv.innerHTML = `
          <h3>${tr("roundWord")} ${round.roundNumber}</h3>
          <p><strong>${tr("labelPlayer")}:</strong> ${round.player}</p>
          <p><strong>${tr("labelDifficulty")}:</strong> ${getDifficultyLabel(round.difficultyLevel)}</p>
          <p><strong>${tr("labelTable")}:</strong> ${round.table}</p>
          <p><strong>${tr("labelScore")}:</strong> ${round.points}/${round.pointsAvailable || (round.totalQuestions * 3)}</p>
          <p><strong>${tr("labelCorrect")}:</strong> ${round.correctAnswers}/${round.totalQuestions} (${round.percentage}%)</p>
          <table class="qa-table">
            <thead>
              <tr>
                <th>${tr("headerQuestion")}</th>
                <th>${tr("headerYourAnswer")}</th>
                <th>${tr("headerCorrectAnswer")}</th>
                <th>${tr("headerAttempts")}</th>
                <th>${tr("headerPoints")}</th>
                <th>${tr("headerResult")}</th>
              </tr>
            </thead>
            <tbody>
              ${tableRows}
            </tbody>
          </table>
        `;
        
        summaryList.appendChild(roundDiv);
      }
      
      if (roundHistory.length === 0) {
        summaryList.innerHTML = `<p style='text-align: center; color: #999;'>${tr("noRounds")}</p>`;
      }
    }

    function updateProgress() {
      const progressList = document.getElementById("progressList");
      progressList.innerHTML = "";
      for (let i = 1; i <= 10; i++) {
        const stat = tableStats[i];
        const accuracy = stat.total > 0 ? Math.round((stat.correct / stat.total) * 100) : 0;

        const container = document.createElement("div");
        container.className = "progress-container";

        const label = document.createElement("div");
        label.className = "progress-label";
        label.textContent = tr("progressLabel", {
          n: i,
          correct: stat.correct,
          total: stat.total,
          accuracy: accuracy
        });

        const bar = document.createElement("div");
        bar.className = "progress-bar";

        const fill = document.createElement("div");
        fill.className = "progress-fill";
        fill.style.width = accuracy + "%";
        fill.textContent = accuracy + "%";

        bar.appendChild(fill);
        container.appendChild(label);
        container.appendChild(bar);
        progressList.appendChild(container);
      }
    }

    function renderSessionSummary() {
      const summaryEl = document.getElementById("sessionSummaryContent");
      const playerNames = Object.keys(playerRoundHistory);
      const playersWithRounds = playerNames.filter((name) => {
        return Array.isArray(playerRoundHistory[name]) && playerRoundHistory[name].length > 0;
      });

      if (playersWithRounds.length === 0) {
        summaryEl.innerHTML = `<p style='text-align: center; color: #777;'>${tr("sessionNone")}</p>`;
        return;
      }

      const totalRoundsSession = playersWithRounds.reduce((acc, name) => {
        return acc + playerRoundHistory[name].length;
      }, 0);

      const totalPointsSession = playersWithRounds.reduce((acc, name) => {
        return acc + (playerCumulativePoints[name] || 0);
      }, 0);

      const totalMaxPointsSession = playersWithRounds.reduce((acc, name) => {
        const rounds = playerRoundHistory[name] || [];
        const playerMax = rounds.reduce((roundAcc, item) => {
          const maxPoints = typeof item.pointsAvailable === "number" ? item.pointsAvailable : (item.totalQuestions || 0) * 3;
          return roundAcc + maxPoints;
        }, 0);
        return acc + playerMax;
      }, 0);

      const bestRound = sessionHighScores.length > 0 ? sessionHighScores[0] : null;

      const playerRows = playersWithRounds.map((name) => {
        const rounds = playerRoundHistory[name];
        const roundsCount = rounds.length;
        const pointsSum = playerCumulativePoints[name] || 0;
        const maxPointsSum = rounds.reduce((acc, item) => {
          const maxPoints = typeof item.pointsAvailable === "number" ? item.pointsAvailable : (item.totalQuestions || 0) * 3;
          return acc + maxPoints;
        }, 0);
        const avgAccuracy = Math.round(
          rounds.reduce((acc, item) => acc + item.percentage, 0) / roundsCount
        );
        const difficulties = Array.from(new Set(rounds.map((item) => {
          return getDifficultyLabel(item.difficultyLevel);
        })));
        return `
          <tr>
            <td>${name}</td>
            <td>${roundsCount}</td>
            <td>${pointsSum}/${maxPointsSum}</td>
            <td>${avgAccuracy}%</td>
            <td>${difficulties.join(", ")}</td>
          </tr>
        `;
      }).join("");

      const sessionHeaders = tr("sessionHeaders");

      summaryEl.innerHTML = `
        <p><strong>${tr("sessionPlayers")}:</strong> ${playersWithRounds.length}</p>
        <p><strong>${tr("sessionRounds")}:</strong> ${totalRoundsSession}</p>
        <p><strong>${tr("sessionPoints")}:</strong> ${totalPointsSession}/${totalMaxPointsSession}</p>
        <p><strong>${tr("sessionBest")}:</strong> ${bestRound ? `${tr("sessionBestWithPoints", { player: bestRound.player, earned: bestRound.points, max: typeof bestRound.pointsAvailable === "number" ? bestRound.pointsAvailable : "?" })} - ${getDifficultyLabel(bestRound.difficultyLevel)}` : tr("notAvailable")}</p>
        <table class="session-player-table">
          <thead>
            <tr>
              <th>${sessionHeaders[0]}</th>
              <th>${sessionHeaders[1]}</th>
              <th>${sessionHeaders[2]}</th>
              <th>${sessionHeaders[3]}</th>
              <th>${sessionHeaders[4]}</th>
            </tr>
          </thead>
          <tbody>
            ${playerRows}
          </tbody>
        </table>
      `;
    }

    // Allow Enter key to submit
    document.getElementById("answer").addEventListener("keyup", function(event) {
      if (event.key === "Enter") {
        checkAnswer();
      }
    });

    // Initialize progress display and round summary
    updateProgress();
    updateRoundSummary();
    renderHighScores();
    renderSessionSummary();
    updateDifficultyHint();
    updateActionButtons();
    updateGameInfoVisibility();

    document.getElementById("difficultyLevel").addEventListener("change", function() {
      updateDifficultyHint();
      enforceTableSelectionLimit();
      updateActionButtons();
    });

    document.getElementById("languageSelector").addEventListener("change", function(event) {
      setLanguage(event.target.value);
    });

    document.querySelectorAll(".table-option").forEach((opt) => {
      opt.addEventListener("change", function(event) {
        enforceTableSelectionLimit(event.target);
      });
    });

    document.getElementById("playerName").addEventListener("input", function(event) {
      const typedName = event.target.value.trim();
      const highScoreFilter = document.getElementById("highScoreFilter");
      if (!typedName) {
        if (highScoreFilter) {
          highScoreFilter.value = "all";
        }
        updatePlayerStatus(true);
        roundHistory = [];
        tableStats = createEmptyTableStats();
        cumulativePoints = 0;
        updateActionButtons();
        updateRoundSummary();
        updateProgress();
        renderHighScores();

      }
      if (highScoreFilter) {
        highScoreFilter.value = "current";
      }
      setActivePlayer(typedName);
      updateActionButtons();
      updateRoundSummary();
      updateProgress();
      renderHighScores();
    });

    function updatePlayerStatus(reset = false) {
      const status = document.getElementById("playerStatus");
      if (reset) {
        status.textContent = tr("playerNotSet");
        return;
      }
      status.textContent = currentPlayer ? tr("playerStatus", { name: currentPlayer }) : tr("playerNotSet");
    }

    function loadHighScores() {
      const raw = sessionStorage.getItem(HIGH_SCORE_KEY);
      if (!raw) {
        return [];
      }
      try {
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        return [];
      }
    }

    function saveHighScores() {
      sessionStorage.setItem(HIGH_SCORE_KEY, JSON.stringify(sessionHighScores));
    }

    function updateHighScores(roundData) {
      const entry = {
        player: roundData.player,
        points: roundData.points,
        pointsAvailable: roundData.pointsAvailable,
        difficultyLevel: roundData.difficultyLevel,
        percentage: roundData.percentage,
        tables: roundData.table,
        roundNumber: roundData.roundNumber,
        timestamp: new Date().toLocaleTimeString(currentLanguage)
      };

      sessionHighScores.push(entry);
      sessionHighScores.sort((a, b) => {
        if (b.points !== a.points) {
          return b.points - a.points;
        }
        return b.percentage - a.percentage;
      });
      sessionHighScores = sessionHighScores.slice(0, 10);
      saveHighScores();
      renderHighScores();
    }

    function renderHighScores() {
      const filter = document.getElementById("highScoreFilter")?.value || "all";
      const list = document.getElementById("highScoreList");
      const visibleScores = filter === "current"
        ? sessionHighScores.filter((item) => item.player === currentPlayer)
        : sessionHighScores;

      if (visibleScores.length === 0) {
        if (filter === "current" && currentPlayer) {
          list.innerHTML = `<p style='text-align: center; color: #777;'>${tr("highScoreNoneForPlayer", { player: currentPlayer })}</p>`;
        } else if (filter === "current") {
          list.innerHTML = `<p style='text-align: center; color: #777;'>${tr("highScoreNeedPlayer")}</p>`;
        } else {
          list.innerHTML = `<p style='text-align: center; color: #777;'>${tr("highScoreNone")}</p>`;
        }
        return;
      }

      const highScoreHeaders = tr("highScoreHeaders");

      const rows = visibleScores.map((item, index) => {
        return `
          <tr>
            <td>${index + 1}</td>
            <td>${item.player}</td>
            <td>${item.points}</td>
            <td>${item.percentage}%</td>
            <td>${getDifficultyLabel(item.difficultyLevel)}</td>
            <td>${item.timestamp}</td>
          </tr>
        `;
      }).join("");

      list.innerHTML = `
        <table class="highscore-table">
          <thead>
            <tr>
              <th>${highScoreHeaders[0]}</th>
              <th>${highScoreHeaders[1]}</th>
              <th>${highScoreHeaders[2]}</th>
              <th>${highScoreHeaders[3]}</th>
              <th>${highScoreHeaders[4]}</th>
              <th>${highScoreHeaders[5]}</th>
            </tr>
          </thead>
          <tbody>
            ${rows}
          </tbody>
        </table>
      `;
    }

    function clearHighScores() {
      const filter = document.getElementById("highScoreFilter")?.value || "all";
      if (filter === "current") {
        if (!currentPlayer) {
          window.alert(tr("alertPickPlayer"));
          return;
        }
        const confirmedCurrent = window.confirm(tr("confirmClearPlayerScores", { player: currentPlayer }));
        if (!confirmedCurrent) {
          return;
        }
        sessionHighScores = sessionHighScores.filter((item) => item.player !== currentPlayer);
        saveHighScores();
        renderHighScores();
        return;
      }

      const confirmed = window.confirm(tr("confirmClearAllScores"));
      if (!confirmed) {
        return;
      }
      sessionHighScores = [];
      saveHighScores();
      renderHighScores();
    }

    function openTableModal() {
      const selected = getSelectedTables();
      renderTableModal(selected);
      document.getElementById("tableModal").style.display = "flex";
    }

    function showAllTablesInModal() {
      renderTableModal("all");
    }

    function renderTableModal(selected) {
      const grid = document.getElementById("tableModalGrid");
      grid.innerHTML = "";

      if (selected === "all" || selected.length === 0) {
        document.getElementById("tableModalTitle").textContent = tr("modalAllTablesTitle");
        for (let t = 1; t <= 10; t++) {
          const header = document.createElement("div");
          header.className = "table-group-title";
          header.textContent = tr("tableOf", { n: t });
          grid.appendChild(header);

          for (let i = 1; i <= 10; i++) {
            const item = document.createElement("div");
            item.className = "table-grid-item";
            item.textContent = `${t} × ${i} = ${t * i}`;
            grid.appendChild(item);
          }
        }
      } else if (selected.length === 1) {
        const tableNumber = selected[0];
        document.getElementById("tableModalTitle").textContent = tr("tableOf", { n: tableNumber });

        for (let i = 1; i <= 10; i++) {
          const item = document.createElement("div");
          item.className = "table-grid-item";
          item.textContent = `${tableNumber} × ${i} = ${tableNumber * i}`;
          grid.appendChild(item);
        }
      } else {
        document.getElementById("tableModalTitle").textContent = tr("modalSelectedTablesTitle");
        selected.forEach((tableNumber) => {
          const header = document.createElement("div");
          header.className = "table-group-title";
          header.textContent = tr("tableOf", { n: tableNumber });
          grid.appendChild(header);

          for (let i = 1; i <= 10; i++) {
            const item = document.createElement("div");
            item.className = "table-grid-item";
            item.textContent = `${tableNumber} × ${i} = ${tableNumber * i}`;
            grid.appendChild(item);
          }
        });
      }
    }

    function getSelectedTables() {
      return Array.from(document.querySelectorAll(".table-option:checked")).map((opt) => {
        return parseInt(opt.value);
      });
    }

    function describeSelectedTables(tables) {
      if (tables.length === 1) {
        return tr("tableOf", { n: tables[0] });
      }
      return tr("tablesList", { list: tables.join(", ") });
    }

    function selectAllTables() {
      const maxTables = getTableSelectionLimit(getActiveDifficultyLevel());
      let selectedCount = 0;
      document.querySelectorAll(".table-option").forEach((opt) => {
        if (selectedCount < maxTables) {
          opt.checked = true;
          selectedCount++;
        } else {
          opt.checked = false;
        }
      });

      if (maxTables < 10) {
        document.getElementById("feedback").textContent = tr("selectFirstTables", { max: maxTables });
      }
    }

    function clearAllTables() {
      document.querySelectorAll(".table-option").forEach((opt) => {
        opt.checked = false;
      });
    }

    function closeTableModal() {
      document.getElementById("tableModal").style.display = "none";
    }

    function handleModalBackdrop(event) {
      if (event.target.id === "tableModal") {
        closeTableModal();
      }
    }

    setLanguage("en");
  </script>
