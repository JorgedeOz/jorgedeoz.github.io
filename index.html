<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Fun Math Game">
    <link rel="apple-touch-icon" sizes="152x152" href="icons/apple-touch-icon-152.png">
    <link rel="apple-touch-icon" sizes="167x167" href="icons/apple-touch-icon-167.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon-180.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
    <link rel="shortcut icon" href="icons/favicon.png">
    <title>Fun Math Tables Game</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <h1 id="appTitle">🎉 Fun Math Tables Game 🎉</h1>

    <!-- Difficulty Selector -->
    <div id="tableSelector">
      <div id="setupProgress" class="setup-progress">
        <span id="setupProgressText">Step 1 of 2</span>
        <div class="setup-progress-dots" aria-hidden="true">
          <span id="setupProgressDot1" class="setup-progress-dot active"></span>
          <span id="setupProgressDot2" class="setup-progress-dot"></span>
        </div>
      </div>
      <div id="setupStepOne" class="setup-step">
        <div id="setupStepOneTitle" class="setup-step-title">Step 1: Player Details</div>
        <div class="setup-row">
          <label for="languageSelector" id="languageLabel">Language:</label>
          <select id="languageSelector" class="setup-control">
            <option value="es">Espa&ntilde;ol</option>
            <option value="en">English</option>
          </select>
        </div>
        <div class="setup-row">
          <label for="playerName" id="playerNameLabel">Player name:</label>
          <input type="text" id="playerName" class="setup-control" placeholder="Enter player name" maxlength="30" autocomplete="name">
        </div>
      </div>
      <div id="setupStepTwo" class="setup-step" style="display: none;">
        <div id="setupStepTwoTitle" class="setup-step-title">Step 2: Choose Tables</div>
        <div class="setup-row">
          <label for="difficultyLevel" id="difficultyLabel">Difficulty:</label>
          <div class="setup-control difficulty-control">
            <select id="difficultyLevel">
              <option value="6" id="difficultyOption6">Practice</option>
              <option value="1" id="difficultyOption1">Easy</option>
              <option value="2" id="difficultyOption2">Medium</option>
              <option value="3" id="difficultyOption3">Hard</option>
              <option value="4" id="difficultyOption4">Hardest</option>
              <option value="5" id="difficultyOption5">Ultimate</option>
            </select>
            <div id="difficultyHint"></div>
          </div>
        </div>
        <div id="chooseTablesLabel">Choose table(s):</div>
        <table class="table-picker" aria-label="Table selection">
          <tbody>
            <tr>
              <td class="table-picker-controls" colspan="2">
                <button type="button" id="selectAllTablesBtn" onclick="selectAllTables()">Select All</button>
                <button type="button" id="clearAllTablesBtn" onclick="clearAllTables()">Clear All</button>
              </td>
            </tr>
            <tr>
              <td><label><input type="checkbox" class="table-option" value="1"><span id="tableOptionLabel1">Table of 1</span></label></td>
              <td><label><input type="checkbox" class="table-option" value="2"><span id="tableOptionLabel2">Table of 2</span></label></td>
            </tr>
            <tr>
              <td><label><input type="checkbox" class="table-option" value="3"><span id="tableOptionLabel3">Table of 3</span></label></td>
              <td><label><input type="checkbox" class="table-option" value="4"><span id="tableOptionLabel4">Table of 4</span></label></td>
            </tr>
            <tr>
              <td><label><input type="checkbox" class="table-option" value="5"><span id="tableOptionLabel5">Table of 5</span></label></td>
              <td><label><input type="checkbox" class="table-option" value="6"><span id="tableOptionLabel6">Table of 6</span></label></td>
            </tr>
            <tr>
              <td><label><input type="checkbox" class="table-option" value="7"><span id="tableOptionLabel7">Table of 7</span></label></td>
              <td><label><input type="checkbox" class="table-option" value="8"><span id="tableOptionLabel8">Table of 8</span></label></td>
            </tr>
            <tr>
              <td><label><input type="checkbox" class="table-option" value="9"><span id="tableOptionLabel9">Table of 9</span></label></td>
              <td><label><input type="checkbox" class="table-option" value="10"><span id="tableOptionLabel10">Table of 10</span></label></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="action-row" id="setupActions">
      <button id="nextSetupBtn" onclick="goToTableStep()">➡️ Next</button>
      <button id="backSetupBtn" onclick="goToPlayerStep()" style="display: none;">⬅️ Back</button>
      <button id="startGameBtn" onclick="startGame()">🚀 Start Game</button>
      <button id="viewTable" onclick="openTableModal()">📘 View Tables</button>
    </div>
    <div class="action-row" id="gameControlActions" style="display: none;">
      <button id="clearSetupBtn" onclick="clearSetup()">🧹 Clear Setup</button>
      <button id="resetGameBtn" onclick="resetGame()" style="display: none;">🔁 Reset Game</button>
      <button id="endSessionBtn" onclick="endSession()" style="display: none;">🛑 End Session</button>
    </div>
    <div class="action-row" id="endRoundActions">
      <button id="newGameFromSummaryBtn" onclick="startNewGameFromResults()">🚀 New Game</button>
      <button id="resetToStep1Btn" onclick="resetToStepOne()">🔁 Reset Game</button>
    </div>

    <div id="playerStatus">Player: Not set</div>
    <div id="round"></div>
    <div id="score"></div>
    <div id="timer">⏱️ Time: --</div>
    <div id="question"></div>
    <input
      type="text"
      id="answer"
      placeholder="Type answer here"
      inputmode="numeric"
      pattern="[0-9]*"
      autocomplete="off"
      enterkeyhint="done"
    >
    <button id="submitAnswer" onclick="checkAnswer()">✅ Submit</button>
    <button id="restart" onclick="restartGame()">🔄 Restart Round</button>
    <div id="feedback"></div>

    <!-- Table Modal -->
    <div id="tableModal" class="modal-backdrop" onclick="handleModalBackdrop(event)">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title" id="tableModalTitle">Table</div>
          <div class="modal-actions">
            <button class="modal-close" id="allTablesBtn" onclick="showAllTablesInModal()">All Tables</button>
            <button class="modal-close" id="closeModalBtn" onclick="closeTableModal()">Close</button>
          </div>
        </div>
        <div class="modal-body">
          <div id="tableModalGrid" class="table-grid"></div>
        </div>
      </div>
    </div>

    <div id="resultsPanels">
      <div id="sessionSummary">
        <h2 id="sessionSummaryTitle">🧾 Session Summary</h2>
        <div id="sessionSummaryContent"></div>
      </div>

      <div id="highScores">
        <h2 id="highScoresTitle">🥇 Session High Scores</h2>
        <div class="highscore-actions">
          <div class="highscore-filter">
            <label for="highScoreFilter" id="highScoreViewLabel">View:</label>
            <select id="highScoreFilter" onchange="renderHighScores()">
              <option value="all" id="highScoreOptionAll">All Players</option>
              <option value="current" id="highScoreOptionCurrent">Current Player</option>
            </select>
          </div>
          <button type="button" class="highscore-clear" id="clearHighScoresBtn" onclick="clearHighScores()">Clear High Scores</button>
        </div>
        <div id="highScoreList"></div>
      </div>

      <!-- Round Summary -->
      <div id="roundSummary">
        <h2 id="roundSummaryTitle">🏆 Round Summary</h2>
        <div id="summaryList"></div>
      </div>

      <!-- Progress Tracker -->
      <div id="progress">
        <h2 id="progressTitle">📊 Progress Tracker</h2>
        <div id="progressList"></div>
      </div>
    </div>

    

    <!-- Background Audio Player 
    <div id="audioPlayer">
      <label for="bgAudio">🎵 Gentle Nature Sounds:</label>
      <audio id="bgAudio" controls loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
    </div>-->

    <script src="js/scripts.js"></script>
  </body>
</html>
